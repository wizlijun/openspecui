# Droid Worker 配置定义
# 定义不同模式下的按钮布局和行为

# 代理配置：
# - use_proxy: true  按下面的 proxy 地址启动 worker
# - use_proxy: false 强制当前 worker 不走代理
# - 删除整个 proxy 块     则继承桌面进程当前环境变量
proxy:
  use_proxy: true
  http_proxy: "http://127.0.0.1:1087"
  https_proxy: "http://127.0.0.1:1087"
  no_proxy: "127.0.0.1,localhost"

modes:
  # 新建 Change 模式
  new_change:
    name: "New Change"
    description: "创建新的 change"
    auto_init_prompt: null # 不自动发送 prompt
    buttons:
      left: [] # 左下方无快捷按钮
      right:
        - label: "New Change"
          role: "new_change"
          prompt_template: "/opsx-new {input}"
          requires_input: true
          position: "before_send" # 在 Send 按钮左边

  # 继续 Change 模式
  continue_change:
    name: "Continue Change"
    description: "继续现有 change 的工作"
    auto_init_prompt: "请重新加载openspec的change上下文，changeId为{changeId},并使用 openspec change show {changeId} 显示当前proposal。全部使用中文"
    confirmation:
      enabled: true
      response_template: "已确认以下项目：\n{selected_items}"
    buttons:
      left:
        - label: "Continue"
          role: "continue"
          prompt: "/opsx-continue"
          requires_input: false
        - label: "Apply"
          role: "apply"
          prompt: "/opsx-apply"
          requires_input: false
        - label: "Code Review"
          role: "code_review"
          action: "open_codex_code_review" # 特殊动作：打开 Codex Worker 并绑定
          requires_input: false
      right: [] # Send 按钮左边无额外按钮

  # Fix Review 模式（从 Codex Worker 的 Droid Fix 触发，用于修复评审问题）
  fix_review:
    name: "Fix Review"
    description: "修复评审问题的 Droid Worker，加载后自动执行修复"
    auto_init_prompt: null # 由 handleDroidFixRequest 动态发送修复指令
    buttons:
      left:
        - label: "Fix"
          role: "fix"
          prompt_template: "代码已经修改完成。请按选择的评审意见，先思考原因，再解决，再调试通过：{input}"
          requires_input: true
        - label: "Review Again"
          role: "review_again"
          action: "open_codex_code_review"
          requires_input: false
        - label: "Finish"
          role: "finish"
          prompt_template: "/opsx-archive 并且总结做的变更，提交git"
          requires_input: true
      right: []

  # 通用 Worker 模式（Ops Agent 使用）
  general:
    name: "General Worker"
    description: "通用 Droid Worker，支持 Ops Agent 日志分析等场景"
    auto_init_prompt: null
    confirmation:
      enabled: true
    buttons:
      left:
        - label: "Fix"
          role: "fix"
          prompt_template: "请逐个修复以下问题：\n{input}"
          requires_input: true
      right: []
